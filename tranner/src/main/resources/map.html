<!--
 * map.html — Interactive map using Leaflet.js + OpenStreetMap
 *
 * Renders an interactive map inside the JavaFX WebView (MapViewClient.java).

 * Map library : Leaflet.js v1.9.4 (https://leafletjs.com)
 * Tile source : OpenStreetMap (https://www.openstreetmap.org)
 * No API key required.

-->

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style> html, body, #map { height: 100%; margin: 0; padding: 0; } </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([41.8781, -87.6298], 12);

    // OpenStreetMap 瓦片 — 不需要 API key
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'OpenStreetMap'
    }).addTo(map);

    var markers = [];

    function setCity(lat, lng, zoom) {
        map.setView([lat, lng], zoom);
        clearMarkers();
    }

    function addMarker(lat, lng, name, type) {
        var color = type === 'hotel' ? 'orange' : type === 'restaurant' ? 'green' : 'red';
        var marker = L.circleMarker([lat, lng], {
            radius: 10, fillColor: color, color: '#fff',
            fillOpacity: 1, weight: 2
        }).addTo(map).bindPopup(name);

        marker.on('click', function() {
            if (window.javaConnector) {
                javaConnector.onMarkerClicked(name, type);
            }
        });
        markers.push(marker);
    }

    function clearMarkers() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
    }
</script>
</body>
</html>
